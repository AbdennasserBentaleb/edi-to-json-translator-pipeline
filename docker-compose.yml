version: '3.8'

services:
  edi-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: edi-translator-pipeline:1.0.0
    container_name: edi-translator-pipeline
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - EDI_INPUT_DIR=/app/input
      - EDI_UPLOAD_DIR=/app/input
      - EDI_ERROR_DIR=/app/error
      - EDI_REST_ENDPOINT=http://localhost:8080/api/v1/canonical
    volumes:
      - ./inbox:/app/input
      - ./error:/app/error
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
